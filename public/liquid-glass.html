<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="rns.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Effect</title>
    <style>
        /* 1. Base Setup & Dark Background */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Dark background with a gradient or image to show off the glass effect */
            background: linear-gradient(45deg, #121212, #2a2a2a);
            /* Optional: Add a subtle pattern or image for better distortion visibility */
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrollbars if not needed */
        }

        /* 2. Liquid Glass Card (from AppCard.vue) */
        .card {
            width: 400px; /* Adapted from wrapper width */
            /* min-height: 500px; */
            display: flex;
            flex-direction: column; /* Changed to column for form layout */
            align-items: center;    /* Center content */
            justify-content: center;
            padding: 2rem;
            
            /* Glass & Liquid Effect */
            border-radius: 28px;
            backdrop-filter: brightness(1.1) blur(2px) url(#displacementFilter);
            -webkit-backdrop-filter: brightness(1.1) blur(2px) url(#displacementFilter);
            
            /* Shadows for depth */
            filter: drop-shadow(-8px -10px 46px rgba(0,0,0,0.37));
            
            /* Border effects */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                inset 2px 2px 0px -2px rgba(255, 255, 255, 0.7), 
                inset 0 0 3px 1px rgba(255, 255, 255, 0.7);
            
            color: #fff;
            position: relative;
            z-index: 1;
        }

        /* 3. Form Content Styles (from AppGlassmorphism.vue) */
        
        /* Typography */
        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Input Fields */
        .input-field {
            position: relative;
            border-bottom: 2px solid #ccc;
            margin: 15px 0;
        }

        .input-field label {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            color: #fff;
            font-size: 16px;
            pointer-events: none;
            transition: 0.15s ease;
        }

        .input-field input {
            width: 100%;
            height: 40px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: #fff;
        }

        .input-field input:focus ~ label,
        .input-field input:valid ~ label {
            font-size: 0.8rem;
            top: 10px;
            transform: translateY(-120%);
        }

        /* Forget Password / Options */
        .forget {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 25px 0 35px 0;
            color: #fff;
            font-size: 0.9rem;
        }

        #remember {
            accent-color: #fff;
            margin-right: 5px;
        }

        .forget label {
            display: flex;
            align-items: center;
        }

        .forget a {
            color: #efefef;
            text-decoration: none;
        }

        .forget a:hover {
            text-decoration: underline;
        }

        /* Button */
        button {
            background: #fff;
            color: #000;
            font-weight: 600;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 16px;
            border: 2px solid transparent;
            transition: 0.3s ease;
        }

        button:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Register Link */
        .register {
            text-align: center;
            margin-top: 30px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .register a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register a:hover {
            text-decoration: underline;
        }

        /* Hide the SVG filter element visually */
        svg.filter-def {
            position: absolute;
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>

    <!-- SVG Filter Definition for the Liquid Effect -->
    <svg class="filter-def">
        <filter id="displacementFilter">
            <feTurbulence type="turbulence" 
                baseFrequency="0.01" 
                numOctaves="2" 
                result="turbulence" />
            <feDisplacementMap in="SourceGraphic"
                in2="turbulence"    
                scale="30" xChannelSelector="R" yChannelSelector="G" />
            <!-- Note: Scale reduced from 200 to 30 for a more usable UI. 
                 200 might be too extreme for a small card, but adjustable. -->
        </filter>
    </svg>

    <!-- The Liquid Glass Card -->
    <div class="card">
        <h2>Login</h2>
        <form action="#">
            <div class="input-field">
                <input type="text" required>
                <label>Enter your email</label>
            </div>
            <div class="input-field">
                <input type="password" required>
                <label>Enter your password</label>
            </div>
            <div class="forget">
                <label for="remember">
                    <input type="checkbox" id="remember">
                    <p>Remember me</p>
                </label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit">Log In</button>
            <div class="register">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>

</body>
</html>
